<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士到站時間 - 順利</title>
<style>
:root {
  --bg: #0f0f14;
  --card: #1a1a25;
  --card2: #1e1e2a;
  --text: #e0e0e0;
  --text2: #999;
  --accent: #4a90d9;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --gmb: #a855f7;
  --border: #2a2a3a;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:linear-gradient(135deg,#1a1a30,#1e1e35); padding:16px 20px; text-align:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.header h1 { font-size:1.4rem; color:#fff; }
.header .update { font-size:0.75rem; color:var(--text2); margin-top:4px; }

/* Tabs */
.tabs { display:flex; gap:4px; padding:12px 16px 0; max-width:800px; margin:0 auto; }
.tab { flex:1; padding:10px; text-align:center; border-radius:var(--radius) var(--radius) 0 0; cursor:pointer; font-size:0.95rem; font-weight:600; border:1px solid transparent; transition:all .2s; background:var(--card); color:var(--text2); }
.tab.active { background:var(--card2); color:#fff; border-color:var(--border); border-bottom-color:transparent; }

/* Container */
.container { max-width:800px; margin:0 auto; padding:0 16px 40px; }

/* Station Cards */
.station { background:var(--card); border-radius:var(--radius); margin-top:16px; overflow:hidden; box-shadow:var(--shadow); }
.station-header { padding:14px 18px; background:var(--card2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.station-header .icon { font-size:1.3rem; }
.station-header h2 { font-size:1.05rem; font-weight:600; color:#fff; }
.station-header .badge { font-size:0.7rem; padding:3px 8px; border-radius:10px; background:#333; color:var(--text2); }
.station-body { padding:8px 0; }

/* Route rows */
.route { border-bottom:1px solid rgba(255,255,255,0.04); }
.route:last-child { border-bottom:none; }
.route-main { display:flex; align-items:center; padding:10px 18px; cursor:pointer; transition:background .15s; gap:10px; min-height:48px; }
.route-main:hover { background:rgba(255,255,255,0.03); }
.route-num { font-weight:700; font-size:0.9rem; min-width:48px; padding:4px 8px; border-radius:6px; text-align:center; }
.route-num.kmb { background:#2563eb; color:#fff; }
.route-num.gmb { background:var(--gmb); color:#fff; }
.route-dest { flex:1; font-size:0.88rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.route-etas { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.eta-badge { padding:3px 9px; border-radius:14px; font-size:0.78rem; font-weight:600; white-space:nowrap; }
.eta-green { background:#064e3b; color:var(--green); }
.eta-yellow { background:#451a03; color:var(--yellow); }
.eta-blue { background:#1e3a5f; color:#60a5fa; }
.eta-na { background:#333; color:var(--text2); }
.route-arrow { font-size:0.7rem; color:var(--text2); transition:transform .2s; min-width:16px; text-align:center; }
.route.expanded .route-arrow { transform:rotate(90deg); }

/* Route stops expand */
.route-stops { display:none; background:rgba(0,0,0,0.2); padding:6px 18px 12px 70px; }
.route.expanded .route-stops { display:block; }
.route-stops .stop-item { display:flex; align-items:center; padding:4px 0; font-size:0.78rem; color:var(--text2); gap:8px; }
.route-stops .stop-seq { width:24px; height:24px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:700; color:var(--text2); flex-shrink:0; }
.route-stops .stop-seq.current { background:var(--accent); color:#fff; }
.route-stops .stop-name { flex:1; }
.route-stops .stop-code { color:var(--text2); font-size:0.68rem; }

/* Empty state */
.empty { padding:30px; text-align:center; color:var(--text2); font-size:0.9rem; }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--text2); }
.spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Refresh button */
.refresh-bar { display:flex; justify-content:center; padding:12px; }
.refresh-btn { padding:8px 20px; border-radius:20px; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:0.85rem; font-weight:600; }
.refresh-btn:hover { opacity:0.9; }
.countdown { font-size:0.7rem; color:var(--text2); margin-left:8px; }

/* Responsive */
@media(max-width:500px) {
  .route-main { padding:10px 12px; gap:6px; }
  .route-num { min-width:40px; font-size:0.8rem; padding:3px 6px; }
  .route-dest { font-size:0.8rem; }
  .eta-badge { font-size:0.7rem; padding:2px 7px; }
  .route-stops { padding-left:48px; }
}
</style>
</head>

// ============ API ============

async function fetchKMB(stopId) {
  const resp = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
  const data = await resp.json();
  return data.data || [];
}

async function fetchGMB(routeId, stopId) {
  const resp = await fetch(`https://data.etagmb.gov.hk/eta/route-stop/${routeId}/${stopId}`);
  const data = await resp.json();
  return data.data || [];
}

// ============ PROCESS ============

function processKMB(etas) {
  // Group by route + direction + service_type + dest
  const groups = {};
  for (const e of etas) {
    if (!e.route) continue;
    const key = `${e.route}|${e.dir}|${e.service_type}|${e.dest_tc}`;
    if (!groups[key]) {
      groups[key] = {
        route: e.route,
        dir: e.dir,
        service_type: e.service_type,
        dest: e.dest_tc,
        dest_en: e.dest_en,
        co: e.co || 'KMB',
        seq: e.seq,
        etas: [],
        remarks: new Set(),
      };
    }
    const g = groups[key];
    if (e.eta) g.etas.push(e.eta);
    if (e.rmk_tc) g.remarks.add(e.rmk_tc);
  }
  // Sort etas, compute minutes
  const now = new Date();
  const result = Object.values(groups);
  for (const g of result) {
    g.etas = g.etas.map(eta => {
      const t = new Date(eta);
      const mins = Math.round((t - now) / 60000);
      return { time: eta, mins };
    }).filter(e => e.mins >= -2).sort((a, b) => a.mins - b.mins);
    g.remarks = [...g.remarks].join(', ');
  }
  return result;
}

function processGMB(etas, routeSeq) {
  // Filter by route_seq
  const relevant = etas.filter(e => e.route_seq === routeSeq);
  const result = [];
  for (const entry of relevant) {
    const etas = (entry.eta || []).map(e => {
      const t = new Date(e.timestamp);
      const mins = Math.round((t - new Date()) / 60000);
      return { time: e.timestamp, mins, remark: e.remarks_tc };
    }).filter(e => e.mins >= -2).sort((a, b) => a.mins - b.mins);

    // Split into directions based on stop_seq
    const isOutbound = entry.stop_seq <= 7;
    result.push({
      route: '54S',
      dir: isOutbound ? '去程' : '回程',
      dest: isOutbound ? '黃大仙(循環線)' : '順利(循環線)',
      co: 'GMB',
      service_type: 1,
      etas,
      remarks: '',
      route_seq: entry.route_seq,
      stop_seq: entry.stop_seq,
    });
  }
  return result;
}

// ============ RENDER ============

function etaClass(mins) {
  if (mins < 0) return 'eta-na';
  if (mins <= 3) return 'eta-green';
  if (mins <= 10) return 'eta-yellow';
  return 'eta-blue';
}

function etaText(mins) {
  if (mins < 0) return '已過';
  if (mins === 0) return '即將';
  return `${mins}分`;
}

  const etasHtml = r.etas.length > 0
    ? r.etas.slice(0, 4).map(e => 
        `<span class="eta-badge ${etaClass(e.mins)}">${etaText(e.mins)}</span>`
      ).join('')
    : `<span class="eta-badge eta-na">${r.remarks || '無班次'}</span>`;

  return `
    <div class="route" onclick="this.classList.toggle('expanded')">
      <div class="route-main">
        <span class="route-num ${cls}">${icon} ${routeKey}</span>
        <span class="route-dest">→ ${r.dest}</span>
        <div class="route-etas">${etasHtml}</div>
        <span class="route-arrow">▶</span>
      </div>
      <div class="route-stops">${stopsHtml}</div>
    </div>`;
}

function renderStops(rsKey, routeData) {
  let stops;
  if (rsKey === '54S') {
    stops = GMB_54S_STOPS;
  } else {
    stops = ROUTE_STOPS[rsKey] || [];
  }

  // Find current stop seq for highlighting
  const currentSeq = routeData.seq || 0;

  return stops.map(s => {
    const seq = s.seq || s.stop_seq || 0;
    const isCurrent = seq === currentSeq;
    const name = s.name || s.name_tc || '';
    const code = s.stop_id ? s.stop_id.slice(0,8) : '';
    return `
      <div class="stop-item">
        <span class="stop-seq ${isCurrent ? 'current' : ''}">${seq}</span>
        <span class="stop-name">${isCurrent ? '📍 ' : ''}${name}</span>
        ${code ? `<span class="stop-code">${code}</span>` : ''}
      </div>`;
  }).join('');
}

function renderStation(title, icon, stopIds, gmbConfig, routeFilter) {
  let allRoutes = [];

  // KMB stops
  for (const [label, stopId] of Object.entries(stopIds)) {
    const data = etaCache[stopId] || [];
    const processed = processKMB(data);
    for (const r of processed) {
      r.sourceStop = label;
      allRoutes.push(r);
    }
  }

  // GMB
  if (gmbConfig) {
    const data = etaCache['gmb_54s'] || [];
    const processed = processGMB(data, gmbConfig.routeSeq);
    for (const r of processed) {
      r.sourceStop = '54S';
      allRoutes.push(r);
    }
  }

  // Filter if needed
  if (routeFilter) {
    allRoutes = allRoutes.filter(r => routeFilter.has(r.route));
  }

  // Sort: preferred routes first, then by route number
  const prefOrder = routeFilter ? [...routeFilter] : [];
  allRoutes.sort((a, b) => {
    const ai = prefOrder.indexOf(a.route);
    const bi = prefOrder.indexOf(b.route);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1;
    if (bi >= 0) return 1;
    return a.route.localeCompare(b.route, undefined, {numeric: true});
  });

  if (allRoutes.length === 0) {
    return `
      <div class="station">
        <div class="station-header">
          <span class="icon">${icon}</span>
          <h2>${title}</h2>
        </div>
        <div class="station-body"><div class="empty">暫無班次資料</div></div>
      </div>`;
  }

  const rows = allRoutes.map(r => renderRouteRow(r, !!routeFilter)).join('');

  return `
    <div class="station">
      <div class="station-header">
        <span class="icon">${icon}</span>
        <h2>${title}</h2>
        <span class="badge">${allRoutes.length} 條路線</span>
      </div>
      <div class="station-body">${rows}</div>
    </div>`;
}

async function refresh() {
  updateCountdown = 30;
  document.getElementById('updateTime').textContent = '更新中...';

  try {
    // Fetch all in parallel
    const [kt183, kt184, wt298, kt220, gmb54s] = await Promise.all([
      fetchKMB(STOPS.KT183),
      fetchKMB(STOPS.KT184),
      fetchKMB(STOPS.WT298),
      fetchKMB(STOPS.KT220),
      fetchGMB(GMB_54S.routeId, GMB_54S.stopId),
    ]);

    etaCache[STOPS.KT183] = kt183;
    etaCache[STOPS.KT184] = kt184;
    etaCache[STOPS.WT298] = wt298;
    etaCache[STOPS.KT220] = kt220;
    etaCache['gmb_54s'] = gmb54s;

    render();
    document.getElementById('updateTime').textContent = 
      `最後更新：${new Date().toLocaleTimeString('zh-HK', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
  } catch (e) {
    document.getElementById('updateTime').textContent = '更新失敗: ' + e.message;
  }
}

function render() {
  const container = document.getElementById('content');
  
  if (currentTab === 'fav') {
    container.innerHTML = renderStation(
      '順利消防局', '🚏',
      { KT183: STOPS.KT183, KT184: STOPS.KT184 },
      GMB_54S,
      FAV_ROUTES
    );
  } else {
    // All tab — 3 sections
    container.innerHTML = 
      '<div style="font-size:0.8rem;color:var(--text2);padding:12px 0 4px;text-align:center">▼ 順利消防局</div>' +
      renderStation(
        '順利消防局', '🚏',
        { KT183: STOPS.KT183, KT184: STOPS.KT184 },
        GMB_54S,
        null // no filter — all routes
      ) +
      '<div style="font-size:0.8rem;color:var(--text2);padding:12px 0 4px;text-align:center;margin-top:8px">▼ 景泰街站</div>' +
      renderStation(
        '景泰街站 (WT298)', '🚏',
        { WT298: STOPS.WT298 },
        null,
        null
      ) +
      '<div style="font-size:0.8rem;color:var(--text2);padding:12px 0 4px;text-align:center;margin-top:8px">▼ 敬業街站</div>' +
      renderStation(
        '敬業街站 (KT220)', '🚏',
        { KT220: STOPS.KT220 },
        null,
        null
      );
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'fav') || (i === 1 && tab === 'all'));
  });
  render();
}

// Countdown timer
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    updateCountdown--;
    document.getElementById('countdown').textContent = 
      updateCountdown > 0 ? `${updateCountdown}秒後自動更新` : '';
    if (updateCountdown <= 0) {
      updateCountdown = 30;
      refresh();
    }
  }, 1000);
}

// Init
refresh().then(startCountdown);
</script>
</body>
</html>
